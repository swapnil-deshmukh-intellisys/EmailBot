version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      ENABLE_IN_APP_CAMPAIGN_SCHEDULER: 'false'
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker:campaigns
    environment:
      NODE_ENV: production
      ENABLE_IN_APP_CAMPAIGN_SCHEDULER: 'true'
      CAMPAIGN_WORKER_ID: local-docker-worker-1
      CAMPAIGN_SCHEDULER_INTERVAL_MS: '5000'
      CAMPAIGN_WORKER_HEARTBEAT_MS: '15000'
      CAMPAIGN_WORKER_LOCK_STALE_MS: '120000'
    env_file:
      - .env
